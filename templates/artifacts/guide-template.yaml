# Guide Template — Three-Tier Navigation Index
# Auto-generated by sk.design Phase 5.
# Tells agents WHERE to look. Complements knowledge-base.md which tells WHY.
#
# Per-entry limit: max 3 lines (summary + code/file + also-check).
# No total line cap — scales with the number of entries.
#
# --- Tier 1 (system): specs/guide.yaml ---
#
# tier: system
# last-updated: YYYY-MM-DD
#
# domains:
#   {domain-name}:
#     summary: "1-2 sentence description of what this domain owns."
#     code: "{path to domain source code, e.g. src/catalog}"
#     also-check: "Non-obvious cross-cutting concerns. Where else to look."
#
# --- Tier 2 (domain): specs/domains/{domain}/guide.yaml ---
#
# tier: domain
# domain: {domain-name}
# last-updated: YYYY-MM-DD
#
# units:
#   {unit-name}:
#     summary: "1-2 sentence description of what this unit handles."
#     code: "{path to unit source code}"
#     also-check: "Non-obvious cross-cutting concerns."
#
# --- Tier 3 (unit): specs/intents/{intent}/units/{unit}/guide.yaml ---
#
# tier: unit
# unit: {unit-id}
# last-updated: YYYY-MM-DD
#
# modules:
#   {module-name}:
#     summary: "What this module/file handles."
#     file: "{relative path to the file}"
#     also-check: "Related modules or cross-cutting concerns."
